name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check src tests config scripts

      - name: Format check (ruff)
        run: ruff format --check src tests config scripts

      - name: Type check (mypy)
        run: mypy src tests config scripts

      - name: Tests (pytest)
        run: pytest tests/ -q
